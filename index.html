<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NEON VICTORY — Zero-G Disc Arena</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
  html,body{margin:0;height:100%;background:#05070d;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif}
  #app{position:fixed;inset:0}
  canvas{display:block}
  #vrbtn{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);padding:14px 44px;font-size:18px;
    font-weight:800;letter-spacing:2px;color:#dff4ff;background:rgba(10,20,40,.8);border:2px solid #35b6ff;
    border-radius:12px;cursor:pointer;text-shadow:0 0 12px #35b6ff;
    box-shadow:0 0 24px rgba(53,182,255,.35), inset 0 0 18px rgba(53,182,255,.15);display:none;z-index:10}
  #vrbtn:hover{background:rgba(20,40,80,.9)}
  #hint{position:fixed;top:14px;left:16px;color:#7fa8d8;font-size:12px;line-height:1.7;z-index:10;
    text-shadow:0 1px 2px #000;pointer-events:none;opacity:.85;white-space:pre}
  #load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#35b6ff;
    font-size:22px;letter-spacing:8px;z-index:20;background:#05070d;transition:opacity .6s;font-weight:800}
</style>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥏</text></svg>">
<script type="importmap">{"imports":{"three":"./three.module.min.js"}}</script>
</head>
<body>
<div id="app"></div>
<div id="load">NEON&nbsp;VICTORY</div>
<button id="vrbtn">ENTER VR</button>
<div id="hint"></div>
<script type="module" src="./game.js"></script>
</body>
</html>
